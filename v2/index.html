<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>住宅ローン簡易診断</title>
    <link rel="stylesheet" href="css/style.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
    function handleIncomeSelectChange(e) {
        var wrapper = document.getElementById('income-input-wrapper');
        var input = document.getElementById('income-input');
        var value = e.target ? e.target.value : '';
        
        if (value === 'custom-low' || value === 'custom-high') {
            wrapper.style.display = 'flex';
            wrapper.className = 'form-input-wrapper';
            input.required = true;
            input.placeholder = value === 'custom-low' ? '300未満の年収（万円）' : '700以上の年収（万円）';
        } else {
            wrapper.style.display = 'none';
            wrapper.className = 'form-input-wrapper hidden';
            input.required = false;
            input.value = '';
        }
    }
    </script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>住宅ローン簡易診断</h1>
            <p class="subtitle">1分で借入可能額がわかる！</p>
        </header>

        <main class="main">
            <form id="diagnosis-form" class="form">
                <!-- 年収 -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="step">①</span>
                        あなたの年収は？
                    </label>
                    <select id="income-select" class="form-select" required onchange="handleIncomeSelectChange(event)">
                        <option value="">選択してください</option>
                        <option value="custom-low">300万円未満（入力する）</option>
                        <option value="3000000">300〜400万円</option>
                        <option value="4000000">400〜500万円</option>
                        <option value="5000000">500〜600万円</option>
                        <option value="6000000">600〜700万円</option>
                        <option value="custom-high">700万円以上（入力する）</option>
                    </select>
                    <div id="income-input-wrapper" class="form-input-wrapper hidden" style="display:none;">
                        <input type="number" id="income-input" class="form-input" placeholder="年収を入力（万円）" min="0" max="10000" inputmode="numeric">
                        <span class="form-unit">万円</span>
                    </div>
                </div>

                <!-- 年齢 -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="step">②</span>
                        あなたの年齢は？
                    </label>
                    <select id="age" class="form-select" required>
                        <option value="">選択してください</option>
                        <option value="25">25歳以下</option>
                        <option value="30">26〜30歳</option>
                        <option value="35">31〜35歳</option>
                        <option value="40">36〜40歳</option>
                        <option value="45">41〜45歳</option>
                        <option value="50">46〜50歳</option>
                        <option value="55">51〜55歳</option>
                        <option value="60">56〜60歳</option>
                        <option value="64">61〜64歳</option>
                        <option value="65">65歳以上</option>
                    </select>
                </div>

                <!-- 雇用形態 -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="step">③</span>
                        雇用形態は？
                    </label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="employment" value="正社員" required>
                            <span>正社員</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="employment" value="契約社員">
                            <span>契約社員</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="employment" value="派遣社員">
                            <span>派遣社員</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="employment" value="自営業">
                            <span>自営業</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="employment" value="パート・アルバイト">
                            <span>パート・アルバイト</span>
                        </label>
                    </div>
                </div>

                <!-- 勤続年数 -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="step">④</span>
                        勤続年数は？
                    </label>
                    <select id="years-employed" class="form-select" required>
                        <option value="">選択してください</option>
                        <option value="0">1年未満</option>
                        <option value="1">1〜2年</option>
                        <option value="3">3〜5年</option>
                        <option value="5">5〜10年</option>
                        <option value="10">10年以上</option>
                    </select>
                </div>

                <!-- 他の借入 -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="step">⑤</span>
                        現在の借入総額は？（住宅ローン以外）
                    </label>
                    <select id="total-debt" class="form-select" required>
                        <option value="">選択してください</option>
                        <option value="0">なし</option>
                        <option value="500000">50万円以下</option>
                        <option value="1000000">50〜100万円</option>
                        <option value="2000000">100〜200万円</option>
                        <option value="3000000">200〜300万円</option>
                        <option value="5000000">300万円以上</option>
                    </select>
                </div>

                <!-- 毎月の返済希望額 -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="step">⑥</span>
                        毎月の返済希望額は？
                    </label>
                    <select id="monthly-payment" class="form-select" required>
                        <option value="">選択してください</option>
                        <option value="5">5万円</option>
                        <option value="7">7万円</option>
                        <option value="10">10万円</option>
                        <option value="12">12万円</option>
                        <option value="15">15万円</option>
                        <option value="20">20万円以上</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">診断する</button>
            </form>
        </main>
    </div>

    <!-- 結果モーダル -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <!-- Step 1: 結果表示 -->
            <div id="result-step-1" class="result-step">
                <h2>診断結果はLINEでお届けいたします</h2>
                <p class="result-subtitle">しばらくお待ちくださいませ。</p>
                
                <div class="result-actions">
                    <button id="btn-consult" class="btn-primary">詳しく相談する</button>
                    <button id="btn-close-only" class="btn-secondary">閉じる</button>
                </div>
            </div>
            
            <!-- Step 2: 連絡先入力 -->
            <div id="result-step-2" class="result-step hidden">
                <h2>連絡先を入力</h2>
                <p class="result-subtitle">専門スタッフからご連絡いたします</p>
                
                <div class="contact-form">
                    <p class="contact-note">※お名前と電話番号は必須です</p>
                    <input type="text" id="contact-name" class="form-input" placeholder="お名前" required>
                    <input type="tel" id="contact-phone" class="form-input" placeholder="電話番号" required>
                </div>
                
                <div class="result-actions">
                    <button id="btn-submit-contact" class="btn-primary">送信して閉じる</button>
                </div>
            </div>
            
            <!-- Step 3: 完了 -->
            <div id="result-step-3" class="result-step hidden">
                <h2>ありがとうございます！</h2>
                <p class="result-subtitle">担当者より順次ご連絡いたします。</p>
                <button id="btn-close-final" class="btn-primary">閉じる</button>
            </div>
        </div>
    </div>

    <script src="js/liff-init.js"></script>
    <script src="js/calculate.js"></script>
    <script src="js/form.js"></script>
</body>
</html>
